<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <title>SAMANDAR ARCHITECT</title>

</head>

<body>

  <div class="topbar">
    <span class="brand">SAMANDAR ARCHITECT</span>
    <div class="topbar-right">
      <div class="lang-switch">
        <button class="lang-btn active" onclick="setLang('ru')">RU</button>
        <button class="lang-btn" onclick="setLang('uz')">UZ</button>
      </div>
      <div class="step-pill" id="stepPill">1 / 5</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:20%"></div>
    </div>
    <div class="step-labels" id="stepLabels"></div>
  </div>

  <div id="root"></div>

  <script src="./main (1).js"></script>
</body>

</html>
